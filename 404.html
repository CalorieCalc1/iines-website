<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }
        .error-code {
            font-family: 'Playfair Display', Georgia, serif;

            font-weight: 900;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 16px;
            letter-spacing: -0.03em;
        }
        .error-message {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-weight: 300;
        }

<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="/" class="logo">IINES<span class="logo-dot">.</span></a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/pricing">Pricing</a>
                <a href="/contact">Contact</a>

    <section class="error-page">
        <div>
            <div class="error-code">404</div>
